name: 多策略回测

on:
  # 每天收盘后自动运行
  schedule:
    - cron: '30 18 * * 1-5'  # 周一到周五 18:30
  # 也支持手动触发
  workflow_dispatch:

permissions:
  contents: write  # 允许推送数据回仓库

jobs:
  backtest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install akshare pandas numpy requests tushare
      
      - name: 创建必要目录
        run: |
          mkdir -p data/cache output dashboard
      
      - name: 配置环境变量
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          # 将Secrets写入环境变量，GitHub Actions自动注入
          echo "Tushare Token: ${TUSHARE_TOKEN:0:10}..."
          echo "::notice::API密钥已配置"
      
      - name: 运行回测
        run: python backtest.py
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      
      - name: 验证数据生成
        run: |
          if [ ! -f output/strategy_data.json ]; then
            echo "错误：数据文件未生成"
            exit 1
          fi
          echo "数据文件大小："
          ls -lh output/strategy_data.json
      
      - name: 推送数据到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/strategy_data.json
          git commit -m "更新策略数据 $(date +'%Y-%m-%d %H:%M')" || echo "无更改"
          git push
