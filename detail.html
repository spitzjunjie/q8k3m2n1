<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略详情 | 多策略交易系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #050811;
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-surface: #151b2e;
            --bg-elevated: #1a2236;
            --glass-bg: rgba(21, 27, 46, 0.6);
            --glass-border: rgba(0, 240, 255, 0.15);
            --glass-border-hover: rgba(0, 240, 255, 0.4);
            --neon-cyan: #00f0ff;
            --neon-purple: #a855f7;
            --neon-pink: #ec4899;
            --color-positive: #22c55e;
            --color-negative: #ef4444;
            --color-warning: #f59e0b;
            --text-primary: #e6e6e6;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(168, 85, 247, 0.12), transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(0, 240, 255, 0.10), transparent 50%);
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .back-btn:hover {
            border-color: var(--glass-border-hover);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        .section {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.5;
        }

        .section h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section h2::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 2px;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .overview-item {
            padding: 16px;
            background: rgba(5, 8, 17, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .overview-item:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
        }

        .overview-item .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .overview-item .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .overview-item .value.positive {
            color: var(--color-positive);
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }
        .overview-item .value.negative {
            color: var(--color-negative);
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .description {
            margin-top: 20px;
            padding: 16px;
            background: rgba(168, 85, 247, 0.05);
            border-left: 3px solid var(--neon-purple);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .chart-container {
            height: 400px;
            position: relative;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            padding: 14px 16px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5, 8, 17, 0.5);
        }

        th:first-child { border-top-left-radius: 10px; }
        th:last-child { border-top-right-radius: 10px; }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        tr:hover td {
            background: rgba(0, 240, 255, 0.03);
        }

        .profit-positive { color: var(--color-positive); }
        .profit-negative { color: var(--color-negative); }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 10px;
            color: var(--neon-purple);
            font-size: 11px;
            font-family: 'Inter', sans-serif;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 60px;
            color: var(--color-negative);
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 240, 255, 0.2);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 240, 255, 0.4);
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { padding: 16px; }
            .overview-grid { grid-template-columns: 1fr 1fr; }
            .chart-container { height: 300px; }
            table { font-size: 12px; }
            th, td { padding: 10px 8px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">← 返回</button>
        <h1 id="strategyName">策略详情</h1>
    </header>

    <div class="container">
        <div class="section" id="overview">
            <h2>策略概览</h2>
            <div class="loading">加载中...</div>
        </div>

        <div class="section">
            <h2>累计收益曲线</h2>
            <div class="chart-container">
                <canvas id="equityChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>当前持仓 <span class="badge" id="holdingsCount">0</span></h2>
            <div id="holdingsContent">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div class="section">
            <h2>历史交易记录 <span class="badge" id="tradesCount">0</span></h2>
            <div id="tradesContent">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        let equityChart = null;

        async function loadData() {
            const params = new URLSearchParams(window.location.search);
            // 同时支持 name 和 id 参数
            const strategyName = params.get('name') || params.get('id');

            if (!strategyName) {
                document.getElementById('overview').innerHTML =
                    '<div class="error">未指定策略</div>';
                return;
            }

            try {
                const response = await fetch('output/strategy_data.json');
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();

                // 尝试精确匹配，然后模糊匹配
                let strategy = data.strategies.find(s => s.name === strategyName);
                if (!strategy) {
                    // 尝试URL解码后匹配
                    const decodedName = decodeURIComponent(strategyName);
                    strategy = data.strategies.find(s => s.name === decodedName);
                }
                if (!strategy) {
                    document.getElementById('overview').innerHTML =
                        `<div class="error">未找到策略: ${strategyName}<br><small>可用策略数: ${data.strategies.length}</small></div>`;
                    return;
                }

                renderStrategy(strategy);
            } catch (error) {
                document.getElementById('overview').innerHTML =
                    `<div class="error">数据加载失败: ${error.message}</div>`;
            }
        }

        function renderStrategy(strategy) {
            document.title = `${strategy.name} - 多策略模拟交易系统`;
            document.getElementById('strategyName').textContent = `${strategy.name} 详情`;

            const totalPnl = strategy.total_pnl || 0;
            const totalPnlPct = strategy.total_pnl_pct || 0;
            const realizedPnl = strategy.realized_pnl || 0;
            const realizedPnlPct = strategy.realized_pnl_pct || 0;
            const floatingPnl = strategy.floating_pnl || 0;
            const floatingPnlPct = strategy.floating_pnl_pct || 0;

            const totalClass = totalPnl >= 0 ? 'positive' : 'negative';
            const realizedClass = realizedPnl >= 0 ? 'positive' : 'negative';
            const floatingClass = floatingPnl >= 0 ? 'positive' : 'negative';

            const fmtMoney = (v) => {
                const sign = v >= 0 ? '+' : '-';
                return sign + '¥' + Math.abs(v).toLocaleString('zh-CN', {maximumFractionDigits: 2});
            };
            const fmtPct = (v) => {
                const sign = v >= 0 ? '+' : '';
                return sign + v.toFixed(2) + '%';
            };

            const holdingsValue = (strategy.total_value || 0) - (strategy.current_capital || 0);

            document.getElementById('overview').innerHTML = `
                <h2>策略概览</h2>
                <div class="overview-grid">
                    <div class="overview-item">
                        <div class="label">初始资金</div>
                        <div class="value">¥${(strategy.initial_capital || 0).toLocaleString()}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">当前现金</div>
                        <div class="value">¥${(strategy.current_capital || 0).toLocaleString()}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">持仓市值</div>
                        <div class="value">¥${holdingsValue.toLocaleString()}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">总权益</div>
                        <div class="value">¥${(strategy.total_value || 0).toLocaleString()}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">总收益</div>
                        <div class="value ${totalClass}">${fmtPct(totalPnlPct)}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">已实现收益 🟢</div>
                        <div class="value ${realizedClass}">${fmtPct(realizedPnlPct)}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">浮动收益 🟡</div>
                        <div class="value ${floatingClass}">${fmtPct(floatingPnlPct)}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">夏普比率</div>
                        <div class="value">${(strategy.sharpe_ratio || 0).toFixed(2)}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">最大回撤</div>
                        <div class="value">${((strategy.max_drawdown || 0) * 100).toFixed(2)}%</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">胜率</div>
                        <div class="value">${((strategy.win_rate || 0) * 100).toFixed(0)}%</div>
                    </div>
                </div>
                <div class="description">
                    ${strategy.description || strategy.category || ''}
                </div>
            `;

            renderEquityChart(strategy.equity_curve || [], strategy.initial_capital, totalPnl >= 0);
            renderHoldings(strategy.holdings || []);
            renderTrades(strategy.trades || []);
        }

        function renderEquityChart(equityCurve, initialCapital, isPositive) {
            const ctx = document.getElementById('equityChart');

            if (equityCurve.length < 2) {
                equityCurve = [initialCapital, initialCapital];
            }

            const color = isPositive ? '#22c55e' : '#ef4444';
            const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '00');

            if (equityChart) {
                equityChart.destroy();
            }

            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: equityCurve.map((_, i) => i + 1),
                    datasets: [{
                        label: '权益',
                        data: equityCurve,
                        borderColor: color,
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        pointHoverBackgroundColor: color,
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 2
                    }, {
                        label: '初始资金',
                        data: equityCurve.map(() => initialCapital),
                        borderColor: 'rgba(100, 116, 139, 0.5)',
                        borderWidth: 1,
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: '#94a3b8',
                                usePointStyle: true,
                                padding: 20
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(10, 14, 26, 0.95)',
                            borderColor: 'rgba(0, 240, 255, 0.3)',
                            borderWidth: 1,
                            padding: 12,
                            titleColor: '#e6e6e6',
                            bodyColor: '#94a3b8',
                            callbacks: {
                                label: (ctx) => ctx.dataset.label + ': ¥' + ctx.parsed.y.toLocaleString()
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: '交易日', color: '#64748b' },
                            grid: { color: 'rgba(255, 255, 255, 0.03)' },
                            ticks: { color: '#64748b' }
                        },
                        y: {
                            title: { display: true, text: '金额 (元)', color: '#64748b' },
                            grid: { color: 'rgba(255, 255, 255, 0.03)' },
                            ticks: {
                                color: '#64748b',
                                callback: (v) => '¥' + v.toLocaleString()
                            }
                        }
                    },
                    animation: {
                        duration: 1200,
                        easing: 'easeOutCubic'
                    }
                }
            });
        }

        function renderHoldings(holdings) {
            document.getElementById('holdingsCount').textContent = holdings.length;
            const content = document.getElementById('holdingsContent');

            if (holdings.length === 0) {
                content.innerHTML = '<div class="empty">暂无持仓</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th>代码</th>
                            <th>买入价</th>
                            <th>数量</th>
                            <th>成本</th>
                            <th>选股逻辑</th>
                            <th>择时逻辑</th>
                            <th>持有天数</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            holdings.forEach(h => {
                html += `
                    <tr>
                        <td>${h.name || '-'}</td>
                        <td>${h.symbol || '-'}</td>
                        <td>¥${(h.buy_price || 0).toFixed(2)}</td>
                        <td>${h.quantity || 0}</td>
                        <td>¥${(h.cost || 0).toLocaleString()}</td>
                        <td style="color: var(--neon-purple); font-family: 'Inter', sans-serif;">${h.stock_reason || '-'}</td>
                        <td style="color: var(--neon-cyan); font-family: 'Inter', sans-serif;">${h.timing_reason || '-'}</td>
                        <td>${h.hold_days || 0}天</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            content.innerHTML = html;
        }

        function renderTrades(trades) {
            document.getElementById('tradesCount').textContent = trades.length;
            const content = document.getElementById('tradesContent');

            if (trades.length === 0) {
                content.innerHTML = '<div class="empty">暂无交易记录</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th>买入日</th>
                            <th>买入价</th>
                            <th>卖出日</th>
                            <th>卖出价</th>
                            <th>收益率</th>
                            <th>持有天数</th>
                            <th>选股逻辑</th>
                            <th>择时逻辑</th>
                            <th>卖出原因</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            trades.forEach(t => {
                const profitPct = t.profit_pct || 0;
                const profitClass = profitPct >= 0 ? 'profit-positive' : 'profit-negative';
                html += `
                    <tr>
                        <td>${t.name || '-'}</td>
                        <td>${t.buy_date || '-'}</td>
                        <td>¥${(t.buy_price || 0).toFixed(2)}</td>
                        <td>${t.sell_date || '-'}</td>
                        <td>¥${(t.sell_price || 0).toFixed(2)}</td>
                        <td class="${profitClass}">${profitPct >= 0 ? '+' : ''}${profitPct.toFixed(2)}%</td>
                        <td>${t.hold_days || 0}天</td>
                        <td style="color: var(--neon-purple); font-family: 'Inter', sans-serif;">${t.stock_reason || '-'}</td>
                        <td style="color: var(--neon-cyan); font-family: 'Inter', sans-serif;">${t.timing_reason || '-'}</td>
                        <td style="color: var(--text-secondary); font-family: 'Inter', sans-serif;">${t.sell_reason || '-'}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            content.innerHTML = html;
        }

        loadData();
    </script>
</body>
</html>
