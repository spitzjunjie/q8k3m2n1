<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略详情 - 多策略模拟交易系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 20px 40px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .back-btn {
            background: #334155;
            border: none;
            color: #e2e8f0;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .back-btn:hover {
            background: #475569;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 40px;
        }
        
        .overview {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            margin-bottom: 24px;
        }
        
        .overview h2 {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        
        .overview-item {
            text-align: center;
        }
        
        .overview-item .label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
        }
        
        .overview-item .value {
            font-size: 24px;
            font-weight: 600;
        }
        
        .overview-item .value.positive { color: #22c55e; }
        .overview-item .value.negative { color: #ef4444; }
        
        .description {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #334155;
            font-size: 14px;
            color: #94a3b8;
        }
        
        .chart-section {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            margin-bottom: 24px;
        }
        
        .chart-section h2 {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        
        .chart-container {
            height: 300px;
        }
        
        .holdings-section {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            margin-bottom: 24px;
        }
        
        .holdings-section h2 {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        
        th {
            font-size: 12px;
            color: #64748b;
            font-weight: 500;
            text-transform: uppercase;
        }
        
        td {
            font-size: 14px;
        }
        
        .profit-positive { color: #22c55e; }
        .profit-negative { color: #ef4444; }
        
        .trades-section {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
        }
        
        .trades-section h2 {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 16px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        
        .loading, .error {
            text-align: center;
            padding: 60px;
        }
        
        .error { color: #ef4444; }
        
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">← 返回</button>
        <h1 id="strategyName">策略详情</h1>
    </header>
    
    <div class="container">
        <div class="overview" id="overview">
            <h2>策略概览</h2>
            <div class="loading">加载中...</div>
        </div>
        
        <div class="chart-section">
            <h2>累计收益曲线</h2>
            <div class="chart-container">
                <canvas id="equityChart"></canvas>
            </div>
        </div>
        
        <div class="holdings-section" id="holdingsSection">
            <h2>当前持仓</h2>
            <div id="holdingsContent">
                <div class="loading">加载中...</div>
            </div>
        </div>
        
        <div class="trades-section" id="tradesSection">
            <h2>历史交易记录</h2>
            <div id="tradesContent">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        let equityChart = null;
        
        async function loadData() {
            const params = new URLSearchParams(window.location.search);
            const strategyName = params.get('id');
            
            if (!strategyName) {
                document.getElementById('overview').innerHTML = 
                    '<div class="error">未指定策略</div>';
                return;
            }
            
            try {
                const response = await fetch('../output/strategy_data.json');
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                
                const strategy = data.strategies.find(s => s.name === strategyName);
                if (!strategy) {
                    document.getElementById('overview').innerHTML = 
                        `<div class="error">未找到策略: ${strategyName}</div>`;
                    return;
                }
                
                renderStrategy(strategy);
            } catch (error) {
                document.getElementById('overview').innerHTML = 
                    `<div class="error">数据加载失败: ${error.message}</div>`;
            }
        }
        
        function renderStrategy(strategy) {
            document.title = `${strategy.name} - 多策略模拟交易系统`;
            document.getElementById('strategyName').textContent = `${strategy.name} 详情`;
            
            // 概览
            const ret = strategy.total_return || 0;
            const monthlyRet = strategy.monthly_return || 0;
            const retClass = ret >= 0 ? 'positive' : 'negative';
            const monthlyClass = monthlyRet >= 0 ? 'positive' : 'negative';
            
            document.getElementById('overview').innerHTML = `
                <h2>策略概览</h2>
                <div class="overview-grid">
                    <div class="overview-item">
                        <div class="label">累计收益</div>
                        <div class="value ${retClass}">${(ret * 100).toFixed(2)}%</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">本月收益</div>
                        <div class="value ${monthlyClass}">${(monthlyRet * 100).toFixed(2)}%</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">夏普比率</div>
                        <div class="value">${(strategy.sharpe_ratio || 0).toFixed(2)}</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">最大回撤</div>
                        <div class="value">${((strategy.max_drawdown || 0) * 100).toFixed(2)}%</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">胜率</div>
                        <div class="value">${((strategy.win_rate || 0) * 100).toFixed(0)}%</div>
                    </div>
                    <div class="overview-item">
                        <div class="label">当前权益</div>
                        <div class="value">¥${(strategy.total_value || 0).toLocaleString()}</div>
                    </div>
                </div>
                <div class="description">
                    ${strategy.description || strategy.category || ''}
                </div>
            `;
            
            // 权益曲线
            renderEquityChart(strategy.equity_curve || [], strategy.initial_capital);
            
            // 持仓
            renderHoldings(strategy.holdings || []);
            
            // 交易记录
            renderTrades(strategy.trades || []);
        }
        
        function renderEquityChart(equityCurve, initialCapital) {
            const ctx = document.getElementById('equityChart');
            
            if (equityCurve.length < 2) {
                equityCurve = [initialCapital, initialCapital * 1.01];
            }
            
            const lastValue = equityCurve[equityCurve.length - 1];
            const firstValue = equityCurve[0];
            const color = lastValue >= firstValue ? '#22c55e' : '#ef4444';
            
            if (equityChart) {
                equityChart.destroy();
            }
            
            equityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: equityCurve.map((_, i) => i + 1),
                    datasets: [{
                        label: '权益',
                        data: equityCurve,
                        borderColor: color,
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: color + '20',
                        tension: 0.4
                    }, {
                        label: '初始资金',
                        data: equityCurve.map(() => initialCapital),
                        borderColor: '#64748b',
                        borderWidth: 1,
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            display: true,
                            labels: { color: '#94a3b8' }
                        }
                    },
                    scales: {
                        x: {
                            title: { display: true, text: '交易日', color: '#64748b' },
                            grid: { color: '#334155' },
                            ticks: { color: '#64748b' }
                        },
                        y: {
                            title: { display: true, text: '金额 (元)', color: '#64748b' },
                            grid: { color: '#334155' },
                            ticks: { color: '#64748b' }
                        }
                    }
                }
            });
        }
        
        function renderHoldings(holdings) {
            const container = document.getElementById('holdingsContent');
            
            if (!holdings.length) {
                container.innerHTML = '<div class="empty-state">暂无持仓</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>股票</th>
                            <th>代码</th>
                            <th>成本</th>
                            <th>现价</th>
                            <th>收益率</th>
                            <th>持仓天数</th>
                            <th>选股逻辑</th>
                            <th>择时逻辑</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            holdings.forEach(h => {
                const profitPct = h.profit_pct || 0;
                const profitClass = profitPct >= 0 ? 'profit-positive' : 'profit-negative';
                
                html += `
                    <tr>
                        <td>${h.name || h.symbol}</td>
                        <td>${h.symbol}</td>
                        <td>¥${h.buy_price.toFixed(2)}</td>
                        <td>¥${(h.current_price || h.buy_price).toFixed(2)}</td>
                        <td class="${profitClass}">${profitPct.toFixed(2)}%</td>
                        <td>${h.hold_days}天</td>
                        <td>${h.stock_reason || '-'}</td>
                        <td>${h.timing_reason || '-'}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function renderTrades(trades) {
            const container = document.getElementById('tradesContent');
            
            if (!trades.length) {
                container.innerHTML = '<div class="empty-state">暂无交易记录</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>股票</th>
                            <th>买入价</th>
                            <th>卖出价</th>
                            <th>收益率</th>
                            <th>持有天数</th>
                            <th>选股逻辑</th>
                            <th>择时逻辑</th>
                            <th>卖出原因</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            trades.forEach(t => {
                const profitPct = t.profit_pct || 0;
                const profitClass = profitPct >= 0 ? 'profit-positive' : 'profit-negative';
                
                html += `
                    <tr>
                        <td>${t.buy_date}</td>
                        <td>${t.name || t.symbol}</td>
                        <td>¥${t.buy_price.toFixed(2)}</td>
                        <td>¥${t.sell_price.toFixed(2)}</td>
                        <td class="${profitClass}">${profitPct.toFixed(2)}%</td>
                        <td>${t.hold_days}天</td>
                        <td>${t.stock_reason || '-'}</td>
                        <td>${t.timing_reason || '-'}</td>
                        <td>${t.sell_reason || '-'}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        loadData();
    </script>
</body>
</html>
