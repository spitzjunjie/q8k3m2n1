<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略总览 | 多策略交易系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #050811;
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-surface: #151b2e;
            --bg-elevated: #1a2236;
            --glass-bg: rgba(21, 27, 46, 0.6);
            --glass-border: rgba(0, 240, 255, 0.15);
            --glass-border-hover: rgba(0, 240, 255, 0.4);
            --neon-cyan: #00f0ff;
            --neon-purple: #a855f7;
            --neon-pink: #ec4899;
            --color-positive: #22c55e;
            --color-negative: #ef4444;
            --color-warning: #f59e0b;
            --text-primary: #e6e6e6;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --shadow-glow-cyan: 0 0 30px rgba(0, 240, 255, 0.3);
            --shadow-glow-purple: 0 0 30px rgba(168, 85, 247, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(168, 85, 247, 0.12), transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(0, 240, 255, 0.10), transparent 50%);
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            pointer-events: none;
        }

        /* 顶部导航 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 导航链接 */
        .nav-links {
            display: flex;
            gap: 8px;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.2s;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--neon-cyan);
            background: rgba(0, 240, 255, 0.1);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: var(--color-positive);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--color-positive);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { opacity: 0.6; box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px;
        }

        /* 汇总卡片 */
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .summary-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0.5;
        }

        .summary-card:hover {
            transform: translateY(-3px);
            border-color: var(--glass-border-hover);
            box-shadow: var(--shadow-glow-cyan);
        }

        .summary-card .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .summary-card .value.positive { color: var(--color-positive); text-shadow: 0 0 20px rgba(34, 197, 94, 0.4); }
        .summary-card .value.negative { color: var(--color-negative); text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        /* 策略网格 */
        .strategies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .strategy-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .strategy-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(0, 240, 255, 0.05) 100%);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .strategy-card:hover {
            transform: translateY(-6px);
            border-color: var(--glass-border-hover);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 240, 255, 0.2);
        }

        .strategy-card:hover::before { opacity: 1; }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .rank {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            background: rgba(100, 116, 139, 0.15);
            color: var(--text-secondary);
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .rank.top {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(168, 85, 247, 0.2));
            color: var(--neon-cyan);
            border-color: var(--glass-border-hover);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .strategy-name {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .strategy-category {
            font-size: 11px;
            padding: 4px 10px;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .returns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
            padding: 16px;
            background: rgba(5, 8, 17, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .return-item .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .return-item .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 600;
        }

        .return-item .value.positive { color: var(--color-positive); }
        .return-item .value.negative { color: var(--color-negative); }

        .chart-container {
            height: 80px;
            margin: 12px 0;
            position: relative;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        .loading::after {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            text-align: center;
            padding: 60px;
            color: var(--color-negative);
            font-size: 16px;
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 16px;
        }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.2); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.4); }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .strategies-grid { grid-template-columns: 1fr; }
            .header { padding: 16px; }
            .logo { font-size: 16px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">📊</div>
            <span>多策略交易系统</span>
        </div>
        <div class="header-right">
            <nav class="nav-links">
                <a href="index.html" class="active">策略总览</a>
                <a href="evaluation.html">评估中心</a>
                <a href="stress_test_report.html">压力测试</a>
            </nav>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>LIVE</span>
            </div>
            <span id="updateTime">加载中...</span>
        </div>
    </header>

    <div class="container">
        <div class="summary" id="summary">
            <div class="summary-card">
                <div class="label">策略数量</div>
                <div class="value" id="strategyCount">-</div>
            </div>
            <div class="summary-card">
                <div class="label">平均收益</div>
                <div class="value" id="avgReturn">-</div>
            </div>
            <div class="summary-card">
                <div class="label">正收益策略</div>
                <div class="value" id="positiveCount">-</div>
            </div>
            <div class="summary-card">
                <div class="label">最高收益</div>
                <div class="value" id="maxReturn">-</div>
            </div>
        </div>

        <div class="strategies-grid" id="strategiesGrid">
            <div class="loading">加载数据中...</div>
        </div>
    </div>

    <script>
        const charts = {};

        async function loadData() {
            try {
                const response = await fetch('output/strategy_data.json');
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                document.getElementById('strategiesGrid').innerHTML =
                    '<div class="error">数据加载失败: ' + error.message + '<br>请确保本地服务器已启动</div>';
            }
        }

        function renderDashboard(data) {
            document.getElementById('updateTime').textContent = '更新: ' + (data.update_time || new Date().toLocaleString());

            let strategies = data.strategies || [];

            // 计算综合分（与evaluation.html一致）
            strategies = strategies.map(s => {
                const ret = (s.total_return || 0) * 100;
                const sharpe = s.sharpe_ratio || 0;
                const dd = (s.max_drawdown || 0) * 100;
                const win = (s.win_rate || 0) * 100;
                const score = Math.min(100, Math.max(0, Math.round(
                    Math.min(ret, 50) * 0.6 +
                    Math.min(sharpe, 3) * 8.3 +
                    Math.max(0, 25 - dd * 0.5) +
                    win * 0.2
                )));
                return { ...s, composite_score: score };
            });

            // 按综合分排序
            strategies.sort((a, b) => b.composite_score - a.composite_score);

            // 使用与evaluation.html一致的字段
            const returns = strategies.map(s => (s.total_return || 0) * 100);  // 转为百分比
            const avgReturn = returns.reduce((a, b) => a + b, 0) / (returns.length || 1);
            const positiveCount = returns.filter(r => r > 0).length;
            const maxReturn = Math.max(...returns, 0);

            document.getElementById('strategyCount').textContent = strategies.length;
            const avgEl = document.getElementById('avgReturn');
            avgEl.textContent = (avgReturn >= 0 ? '+' : '') + avgReturn.toFixed(2) + '%';
            avgEl.className = 'value ' + (avgReturn >= 0 ? 'positive' : 'negative');

            const posEl = document.getElementById('positiveCount');
            posEl.textContent = positiveCount + '/' + strategies.length;
            posEl.className = 'value ' + (positiveCount > strategies.length / 2 ? 'positive' : 'negative');

            const maxEl = document.getElementById('maxReturn');
            maxEl.textContent = (maxReturn >= 0 ? '+' : '') + maxReturn.toFixed(2) + '%';
            maxEl.className = 'value ' + (maxReturn >= 0 ? 'positive' : 'negative');

            const grid = document.getElementById('strategiesGrid');
            grid.innerHTML = '';

            strategies.forEach((strategy, index) => {
                const rank = index + 1;
                const totalReturn = (strategy.total_return || 0) * 100;  // 统一使用total_return
                const realizedPnl = strategy.realized_pnl || 0;
                const realizedPnlPct = (strategy.realized_pnl_pct || 0);
                const floatingPnl = strategy.floating_pnl || 0;
                const floatingPnlPct = (strategy.floating_pnl_pct || 0);

                const totalClass = totalReturn >= 0 ? 'positive' : 'negative';
                const rankClass = rank <= 3 ? 'top' : '';
                const holdings = strategy.holdings || [];

                const fmtMoney = (v) => {
                    const sign = v >= 0 ? '+' : '';
                    return sign + '¥' + Math.abs(v).toLocaleString('zh-CN', {maximumFractionDigits: 0});
                };
                const fmtPct = (v) => {
                    const sign = v >= 0 ? '+' : '';
                    return sign + v.toFixed(2) + '%';
                };

                const card = document.createElement('div');
                card.className = 'strategy-card';
                card.onclick = () => window.location.href = 'detail.html?name=' + encodeURIComponent(strategy.name);

                card.innerHTML = '<div class="card-header">' +
                    '<span class="rank ' + rankClass + '">' + rank + '</span>' +
                    '<span class="strategy-name">' + strategy.name + '</span>' +
                    '<span class="strategy-category">' + strategy.category + '</span>' +
                    '</div>' +
                    '<div class="returns">' +
                    '<div class="return-item"><div class="label">总收益</div><div class="value ' + totalClass + '">' + fmtPct(totalReturn) + '</div></div>' +
                    '<div class="return-item"><div class="label">已实现</div><div class="value ' + totalClass + '">' + fmtPct(realizedPnlPct) + '</div></div>' +
                    '<div class="return-item"><div class="label">浮动</div><div class="value ' + totalClass + '">' + fmtPct(floatingPnlPct) + '</div></div>' +
                    '</div>' +
                    '<div class="chart-container"><canvas id="chart-' + index + '"></canvas></div>' +
                    '<div class="stats">' +
                    '<span>📦 持仓 ' + holdings.length + '只</span>' +
                    '<span>📈 胜率 ' + ((strategy.win_rate || 0) * 100).toFixed(0) + '%</span>' +
                    '<span>📉 回撤 ' + ((strategy.max_drawdown || 0) * 100).toFixed(1) + '%</span>' +
                    '</div>';

                grid.appendChild(card);

                setTimeout(() => renderMiniChart(index, strategy.equity_curve || [], strategy.initial_capital, totalReturn >= 0), 50);
            });
        }

        function renderMiniChart(index, equityCurve, initialCapital, isPositive) {
            const ctx = document.getElementById('chart-' + index);
            if (!ctx) return;

            // 处理equity_curve格式：可能是 {'date': str, 'value': float} 或直接是数字
            let chartData = equityCurve;
            if (equityCurve.length > 0 && typeof equityCurve[0] === 'object') {
                chartData = equityCurve.map(item => item.value);
            }

            if (chartData.length < 2) {
                chartData = [initialCapital, initialCapital];
            }

            const color = isPositive ? '#22c55e' : '#ef4444';
            const gradient = ctx.getContext('2d').createLinearGradient(0, 0, 0, 80);
            gradient.addColorStop(0, color + '40');
            gradient.addColorStop(1, color + '00');

            charts[index] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.map((_, i) => i + 1),
                    datasets: [{
                        data: chartData,
                        borderColor: color,
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        pointHoverBackgroundColor: color,
                        pointHoverBorderColor: '#fff',
                        pointHoverBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(10, 14, 26, 0.95)',
                            borderColor: 'rgba(0, 240, 255, 0.3)',
                            borderWidth: 1,
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: (ctx) => '¥' + ctx.parsed.y.toLocaleString()
                            }
                        }
                    },
                    scales: { x: { display: false }, y: { display: false } },
                    animation: { duration: 1000, easing: 'easeOutCubic' }
                }
            });
        }

        loadData();
        setInterval(loadData, 5 * 60 * 1000);
    </script>
</body>
</html>
