<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略总览 | 多策略交易系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #050811;
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --glass-bg: rgba(21, 27, 46, 0.6);
            --glass-border: rgba(0, 240, 255, 0.15);
            --neon-cyan: #00f0ff;
            --neon-purple: #a855f7;
            --color-positive: #22c55e;
            --color-negative: #ef4444;
            --text-primary: #e6e6e6;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon { font-size: 28px; }

        .logo span {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--neon-cyan);
            background: rgba(0, 240, 255, 0.1);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 20px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--color-positive);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .live-indicator span {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-positive);
            letter-spacing: 1px;
        }

        #updateTime {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .summary-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .summary-card .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            color: var(--neon-cyan);
        }

        .summary-card .value.positive { color: var(--color-positive); }
        .summary-card .value.negative { color: var(--color-negative); }

        .section {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .section h2 {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 2px;
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .strategy-card {
            background: rgba(5, 8, 17, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .strategy-card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 240, 255, 0.1);
        }

        .strategy-card .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .strategy-card .name {
            font-weight: 600;
            font-size: 15px;
        }

        .grade-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        .grade-A { background: rgba(34, 197, 94, 0.2); color: var(--color-positive); }
        .grade-B { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .grade-C { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .grade-D { background: rgba(100, 116, 139, 0.2); color: var(--text-muted); }

        .strategy-card .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 13px;
        }

        .strategy-card .metric {
            display: flex;
            justify-content: space-between;
        }

        .strategy-card .metric .label {
            color: var(--text-muted);
        }

        .strategy-card .metric .value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .strategy-card .metric .value.positive { color: var(--color-positive); }
        .strategy-card .metric .value.negative { color: var(--color-negative); }

        .chart-wrapper {
            height: 300px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .loading::after {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 3px solid rgba(0, 240, 255, 0.1);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 4px; }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .summary { grid-template-columns: 1fr 1fr; }
            .header { padding: 12px 16px; }
            .nav-links { gap: 4px; }
            .nav-links a { padding: 4px 8px; font-size: 12px; }
            .strategy-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">📊</div>
            <span>多策略交易系统</span>
        </div>
        <div class="header-right">
            <nav class="nav-links">
                <a href="index.html" class="active">策略总览</a>
                <a href="dashboard_v2.html">策略分析</a>
                <a href="evaluation.html">评估中心</a>
                <a href="stress_test_report.html">压力测试</a>
            </nav>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span>LIVE</span>
            </div>
            <span id="updateTime">加载中...</span>
        </div>
    </header>

    <div class="container">
        <div class="summary" id="summary">
            <div class="summary-card">
                <div class="label">总策略数</div>
                <div class="value" id="totalStrategies">-</div>
            </div>
            <div class="summary-card">
                <div class="label">A级策略</div>
                <div class="value positive" id="gradeA">-</div>
            </div>
            <div class="summary-card">
                <div class="label">B级策略</div>
                <div class="value" id="gradeB">-</div>
            </div>
            <div class="summary-card">
                <div class="label">平均收益率</div>
                <div class="value" id="avgReturn">-</div>
            </div>
        </div>

        <div class="section">
            <h2>收益对比</h2>
            <div class="chart-wrapper">
                <canvas id="returnChart"></canvas>
            </div>
        </div>

        <div class="section">
            <h2>策略列表</h2>
            <div class="strategy-grid" id="strategyGrid">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('output/strategy_data.json');
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                
                document.getElementById('updateTime').textContent = `更新: ${data.update_time || '未知'}`;
                
                const strategies = data.strategies || [];
                
                document.getElementById('totalStrategies').textContent = strategies.length;
                document.getElementById('gradeA').textContent = strategies.filter(s => s.grade === 'A级').length;
                document.getElementById('gradeB').textContent = strategies.filter(s => s.grade === 'B级').length;
                
                const avgReturn = strategies.reduce((sum, s) => sum + (parseFloat(s.total_return) || 0), 0) / strategies.length;
                const avgEl = document.getElementById('avgReturn');
                avgEl.textContent = avgReturn.toFixed(2) + '%';
                avgEl.className = 'value ' + (avgReturn >= 0 ? 'positive' : 'negative');
                
                const topStrategies = [...strategies]
                    .sort((a, b) => (parseFloat(b.total_return) || 0) - (parseFloat(a.total_return) || 0))
                    .slice(0, 10);
                
                new Chart(document.getElementById('returnChart'), {
                    type: 'bar',
                    data: {
                        labels: topStrategies.map(s => s.name),
                        datasets: [{
                            label: '收益率 (%)',
                            data: topStrategies.map(s => parseFloat(s.total_return) || 0),
                            backgroundColor: topStrategies.map(s => 
                                (parseFloat(s.total_return) || 0) >= 0 
                                    ? 'rgba(34, 197, 94, 0.6)' 
                                    : 'rgba(239, 68, 68, 0.6)'
                            ),
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            x: {
                                ticks: { color: '#64748b', font: { size: 10 } },
                                grid: { display: false }
                            },
                            y: {
                                ticks: { color: '#64748b', callback: v => v + '%' },
                                grid: { color: 'rgba(255,255,255,0.05)' }
                            }
                        }
                    }
                });
                
                const grid = document.getElementById('strategyGrid');
                grid.innerHTML = strategies.map(s => `
                    <a href="detail.html?name=${encodeURIComponent(s.name)}" class="strategy-card">
                        <div class="header-row">
                            <span class="name">${s.name}</span>
                            <span class="grade-badge grade-${s.grade?.charAt(0)}">${s.grade || 'N/A'}</span>
                        </div>
                        <div class="metrics">
                            <div class="metric">
                                <span class="label">收益率</span>
                                <span class="value ${(parseFloat(s.total_return) || 0) >= 0 ? 'positive' : 'negative'}">${s.total_return || '0'}%</span>
                            </div>
                            <div class="metric">
                                <span class="label">夏普比率</span>
                                <span class="value">${s.sharpe_ratio || '0'}</span>
                            </div>
                            <div class="metric">
                                <span class="label">最大回撤</span>
                                <span class="value negative">${s.max_drawdown || '0'}%</span>
                            </div>
                            <div class="metric">
                                <span class="label">胜率</span>
                                <span class="value">${s.win_rate || '0'}%</span>
                            </div>
                        </div>
                    </a>
                `).join('');
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('strategyGrid').innerHTML = 
                    '<div class="loading">数据加载失败，请刷新重试</div>';
            }
        }
        
        loadData();
    </script>
</body>
</html>
