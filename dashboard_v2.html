<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略分析 | 多策略交易系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-void: #050811;
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-surface: #151b2e;
            --glass-bg: rgba(21, 27, 46, 0.6);
            --glass-border: rgba(0, 240, 255, 0.15);
            --neon-cyan: #00f0ff;
            --neon-purple: #a855f7;
            --color-positive: #22c55e;
            --color-negative: #ef4444;
            --text-primary: #e6e6e6;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-void);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            background: rgba(0, 240, 255, 0.1);
            color: var(--neon-cyan);
        }

        .nav-links a.active {
            background: rgba(0, 240, 255, 0.15);
            color: var(--neon-cyan);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
        }

        .chart-card.full-width {
            grid-column: 1 / -1;
        }

        .chart-card h3 {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-wrapper {
            height: 300px;
            position: relative;
        }

        .chart-wrapper.pie {
            height: 280px;
        }

        .chart-wrapper.scatter {
            height: 350px;
        }

        .stat-row {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
        }

        .stat-card .value.positive { color: var(--color-positive); }
        .stat-card .value.negative { color: var(--color-negative); }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 4px; }

        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .container { padding: 16px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">📊 多策略交易系统</div>
        <nav class="nav-links">
            <a href="index.html">策略总览</a>
            <a href="dashboard_v2.html" class="active">策略分析</a>
            <a href="evaluation.html">评估中心</a>
        </nav>
    </header>

    <div class="container">
        <h1>📈 策略分析看板</h1>

        <div class="stat-row" id="statsRow">
            <div class="stat-card">
                <div class="label">策略数量</div>
                <div class="value" id="strategyCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">平均收益</div>
                <div class="value" id="avgReturn">-</div>
            </div>
            <div class="stat-card">
                <div class="label">平均夏普比率</div>
                <div class="value" id="avgSharpe">-</div>
            </div>
            <div class="stat-card">
                <div class="label">平均胜率</div>
                <div class="value" id="avgWinRate">-</div>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- 收益对比柱状图 -->
            <div class="chart-card full-width">
                <h3>📊 收益对比（按收益率排序）</h3>
                <div class="chart-wrapper">
                    <canvas id="returnChart"></canvas>
                </div>
            </div>

            <!-- 评级分布饼图 -->
            <div class="chart-card">
                <h3>🎯 策略评级分布</h3>
                <div class="chart-wrapper pie">
                    <canvas id="gradeChart"></canvas>
                </div>
            </div>

            <!-- 策略类型分布 -->
            <div class="chart-card">
                <h3>📁 策略类型分布</h3>
                <div class="chart-wrapper pie">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- 风险收益散点图 -->
            <div class="chart-card full-width">
                <h3>⚖️ 风险收益分布（夏普比率 vs 最大回撤）</h3>
                <div class="chart-wrapper scatter">
                    <canvas id="scatterChart"></canvas>
                </div>
            </div>

            <!-- 收益稳定性对比 -->
            <div class="chart-card full-width">
                <h3>📉 权益曲线对比（Top 10 策略）</h3>
                <div class="chart-wrapper">
                    <canvas id="equityCompareChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let data = null;

        async function loadData() {
            try {
                const response = await fetch('output/strategy_data.json');
                if (!response.ok) throw new Error('数据加载失败');
                data = await response.json();
                renderDashboard(data);
            } catch (error) {
                document.querySelector('.container').innerHTML =
                    '<div class="loading">数据加载失败: ' + error.message + '</div>';
            }
        }

        function renderDashboard(data) {
            const strategies = data.strategies || [];

            // 统计数据
            document.getElementById('strategyCount').textContent = strategies.length;

            const returns = strategies.map(s => s.total_pnl_pct || 0);
            const avgReturn = returns.reduce((a, b) => a + b, 0) / (returns.length || 1);
            const avgEl = document.getElementById('avgReturn');
            avgEl.textContent = (avgReturn >= 0 ? '+' : '') + avgReturn.toFixed(2) + '%';
            avgEl.className = 'value ' + (avgReturn >= 0 ? 'positive' : 'negative');

            const sharpes = strategies.map(s => s.sharpe_ratio || 0);
            const avgSharpe = sharpes.reduce((a, b) => a + b, 0) / (sharpes.length || 1);
            const avgSharpeEl = document.getElementById('avgSharpe');
            avgSharpeEl.textContent = avgSharpe.toFixed(2);
            avgSharpeEl.className = 'value ' + (avgSharpe >= 1 ? 'positive' : 'negative');

            const winRates = strategies.map(s => s.win_rate || 0);
            const avgWinRate = winRates.reduce((a, b) => a + b, 0) / (winRates.length || 1);
            const avgWinRateEl = document.getElementById('avgWinRate');
            avgWinRateEl.textContent = (avgWinRate * 100).toFixed(1) + '%';
            avgWinRateEl.className = 'value ' + (avgWinRate >= 0.4 ? 'positive' : 'negative');

            // 渲染图表
            renderReturnChart(strategies);
            renderGradeChart(strategies);
            renderCategoryChart(strategies);
            renderScatterChart(strategies);
            renderEquityCompareChart(strategies);
        }

        function renderReturnChart(strategies) {
            const sorted = [...strategies].sort((a, b) => (b.total_pnl_pct || 0) - (a.total_pnl_pct || 0));
            const top15 = sorted.slice(0, 15);

            const ctx = document.getElementById('returnChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top15.map(s => s.name.length > 8 ? s.name.slice(0, 8) + '...' : s.name),
                    datasets: [{
                        label: '收益率(%)',
                        data: top15.map(s => s.total_pnl_pct || 0),
                        backgroundColor: top15.map(s =>
                            (s.total_pnl_pct || 0) >= 0 ? 'rgba(34, 197, 94, 0.8)' : 'rgba(239, 68, 68, 0.8)'
                        ),
                        borderColor: top15.map(s =>
                            (s.total_pnl_pct || 0) >= 0 ? '#22c55e' : '#ef4444'
                        ),
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.parsed.y >= 0 ? '+' : ''}${ctx.parsed.y.toFixed(2)}%`
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#64748b', font: { size: 10 } },
                            grid: { display: false }
                        },
                        y: {
                            ticks: {
                                color: '#64748b',
                                callback: (v) => v + '%'
                            },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }

        function renderGradeChart(strategies) {
            const gradeCounts = {};
            strategies.forEach(s => {
                const grade = s.grade || 'D';
                gradeCounts[grade] = (gradeCounts[grade] || 0) + 1;
            });

            const grades = ['A', 'B', 'C', 'D'];
            const colors = {
                'A': '#22c55e',
                'B': '#3b82f6',
                'C': '#f59e0b',
                'D': '#64748b'
            };

            const ctx = document.getElementById('gradeChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: grades.map(g => g + '级 (' + (gradeCounts[g] || 0) + ')'),
                    datasets: [{
                        data: grades.map(g => gradeCounts[g] || 0),
                        backgroundColor: grades.map(g => colors[g]),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', padding: 15 }
                        }
                    }
                }
            });
        }

        function renderCategoryChart(strategies) {
            const categoryCounts = {};
            strategies.forEach(s => {
                const cat = s.category || '其他';
                categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
            });

            const categories = Object.keys(categoryCounts);
            const colors = categories.map((_, i) =>
                `hsl(${180 + i * 30}, 70%, 50%)`
            );

            const ctx = document.getElementById('categoryChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: categories,
                    datasets: [{
                        data: categories.map(c => categoryCounts[c]),
                        backgroundColor: colors,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { color: '#94a3b8', padding: 10, font: { size: 11 } }
                        }
                    }
                }
            });
        }

        function renderScatterChart(strategies) {
            const ctx = document.getElementById('scatterChart').getContext('2d');

            const datasets = [{
                label: '策略',
                data: strategies.map(s => ({
                    x: (s.max_drawdown || 0) * 100,
                    y: s.sharpe_ratio || 0
                })),
                backgroundColor: strategies.map(s => {
                    const grade = s.grade || 'D';
                    if (grade === 'A') return 'rgba(34, 197, 94, 0.8)';
                    if (grade === 'B') return 'rgba(59, 130, 246, 0.8)';
                    if (grade === 'C') return 'rgba(245, 158, 11, 0.8)';
                    return 'rgba(100, 116, 139, 0.8)';
                }),
                pointRadius: 8,
                pointHoverRadius: 12
            }];

            new Chart(ctx, {
                type: 'scatter',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const s = strategies[ctx.dataIndex];
                                    return `${s.name}: 夏普=${(s.sharpe_ratio||0).toFixed(2)}, 回撤=${((s.max_drawdown||0)*100).toFixed(1)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '最大回撤 (%)',
                                color: '#64748b'
                            },
                            ticks: { color: '#64748b' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '夏普比率',
                                color: '#64748b'
                            },
                            ticks: { color: '#64748b' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }

        function renderEquityCompareChart(strategies) {
            const sorted = [...strategies].sort((a, b) => (b.total_pnl_pct || 0) - (a.total_pnl_pct || 0));
            const top10 = sorted.slice(0, 10);

            const colors = [
                '#00f0ff', '#a855f7', '#22c55e', '#f59e0b',
                '#ec4899', '#3b82f6', '#14b8a6', '#f97316',
                '#8b5cf6', '#06b6d4'
            ];

            const datasets = top10.map((s, i) => {
                let equity = s.equity_curve || [];
                if (equity.length > 0 && typeof equity[0] === 'object') {
                    equity = equity.map(item => item.value);
                }
                if (equity.length < 2) {
                    equity = [s.initial_capital || 30000, s.total_value || 30000];
                }

                return {
                    label: s.name,
                    data: equity,
                    borderColor: colors[i],
                    backgroundColor: 'transparent',
                    tension: 0.4,
                    pointRadius: 0,
                    borderWidth: 2
                };
            });

            const ctx = document.getElementById('equityCompareChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#94a3b8',
                                usePointStyle: true,
                                padding: 15,
                                font: { size: 10 }
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: '#64748b', maxTicksLimit: 10 },
                            grid: { display: false }
                        },
                        y: {
                            ticks: {
                                color: '#64748b',
                                callback: (v) => '¥' + (v/10000).toFixed(0) + '万'
                            },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    }
                }
            });
        }

        loadData();
    </script>
</body>
</html>
