<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多策略模拟交易系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 20px 40px;
            border-bottom: 1px solid #334155;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .header .update-time {
            font-size: 14px;
            color: #94a3b8;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px;
        }
        
        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .summary-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        
        .summary-card .label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .summary-card .value {
            font-size: 28px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .summary-card .value.positive { color: #22c55e; }
        .summary-card .value.negative { color: #ef4444; }
        
        .strategies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
        }
        
        .strategy-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .strategy-card:hover {
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        
        .strategy-card .rank {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #3b82f6;
            border-radius: 50%;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
        }
        
        .strategy-card .rank.top {
            background: linear-gradient(135deg, #f59e0b, #eab308);
        }
        
        .strategy-card .name {
            font-size: 18px;
            font-weight: 600;
            display: inline-block;
        }
        
        .strategy-card .category {
            display: inline-block;
            background: #334155;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #94a3b8;
            margin-left: 12px;
        }
        
        .strategy-card .returns {
            display: flex;
            gap: 24px;
            margin: 20px 0;
        }
        
        .strategy-card .return-item {
            flex: 1;
        }
        
        .strategy-card .return-item .label {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 4px;
        }
        
        .strategy-card .return-item .value {
            font-size: 20px;
            font-weight: 600;
        }
        
        .strategy-card .return-item .value.positive { color: #22c55e; }
        .strategy-card .return-item .value.negative { color: #ef4444; }
        
        .strategy-card .chart-container {
            height: 80px;
            margin: 16px 0;
        }
        
        .strategy-card .stats {
            display: flex;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid #334155;
            font-size: 13px;
            color: #94a3b8;
        }
        
        .strategy-card .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        
        .error {
            text-align: center;
            padding: 60px;
            color: #ef4444;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            .strategies-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>📊 多策略模拟交易系统</h1>
        <div class="update-time" id="updateTime">加载中...</div>
    </header>
    
    <div class="container">
        <div class="summary" id="summary">
            <div class="summary-card">
                <div class="label">策略数量</div>
                <div class="value" id="strategyCount">-</div>
            </div>
            <div class="summary-card">
                <div class="label">平均收益</div>
                <div class="value" id="avgReturn">-</div>
            </div>
            <div class="summary-card">
                <div class="label">正收益策略</div>
                <div class="value" id="positiveCount">-</div>
            </div>
            <div class="summary-card">
                <div class="label">最高收益</div>
                <div class="value" id="maxReturn">-</div>
            </div>
        </div>
        
        <div class="strategies-grid" id="strategiesGrid">
            <div class="loading">加载数据中...</div>
        </div>
    </div>
    
    <script>
        // 全局图表存储
        const charts = {};
        
        async function loadData() {
            try {
                const response = await fetch('../output/strategy_data.json');
                if (!response.ok) throw new Error('数据加载失败');
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                document.getElementById('strategiesGrid').innerHTML = 
                    `<div class="error">数据加载失败: ${error.message}<br>请确保回测引擎已运行</div>`;
            }
        }
        
        function renderDashboard(data) {
            // 更新时间
            document.getElementById('updateTime').textContent = 
                `数据更新时间: ${data.update_time}`;
            
            // 汇总数据
            const strategies = data.strategies || [];
            const returns = strategies.map(s => s.total_return || 0);
            const avgReturn = returns.reduce((a, b) => a + b, 0) / returns.length;
            const positiveCount = returns.filter(r => r > 0).length;
            const maxReturn = Math.max(...returns);
            
            document.getElementById('strategyCount').textContent = strategies.length;
            const avgEl = document.getElementById('avgReturn');
            avgEl.textContent = (avgReturn * 100).toFixed(2) + '%';
            avgEl.className = 'value ' + (avgReturn >= 0 ? 'positive' : 'negative');
            
            const posEl = document.getElementById('positiveCount');
            posEl.textContent = `${positiveCount}/${strategies.length}`;
            posEl.className = 'value ' + (positiveCount > strategies.length / 2 ? 'positive' : 'negative');
            
            const maxEl = document.getElementById('maxReturn');
            maxEl.textContent = (maxReturn * 100).toFixed(2) + '%';
            maxEl.className = 'value ' + (maxReturn >= 0 ? 'positive' : 'negative');
            
            // 策略卡片
            const grid = document.getElementById('strategiesGrid');
            grid.innerHTML = '';
            
            strategies.forEach((strategy, index) => {
                const rank = index + 1;
                const ret = strategy.total_return || 0;
                const monthlyRet = strategy.monthly_return || 0;
                const retClass = ret >= 0 ? 'positive' : 'negative';
                const monthlyClass = monthlyRet >= 0 ? 'positive' : 'negative';
                const rankClass = rank <= 3 ? 'top' : '';
                const holdings = strategy.holdings || [];
                const trades = strategy.trades || [];
                
                const card = document.createElement('div');
                card.className = 'strategy-card';
                card.onclick = () => window.location.href = `detail.html?id=${encodeURIComponent(strategy.name)}`;
                
                card.innerHTML = `
                    <div>
                        <span class="rank ${rankClass}">${rank}</span>
                        <span class="name">${strategy.name}</span>
                        <span class="category">${strategy.category}</span>
                    </div>
                    <div class="returns">
                        <div class="return-item">
                            <div class="label">累计收益</div>
                            <div class="value ${retClass}">${(ret * 100).toFixed(2)}%</div>
                        </div>
                        <div class="return-item">
                            <div class="label">本月收益</div>
                            <div class="value ${monthlyClass}">${(monthlyRet * 100).toFixed(2)}%</div>
                        </div>
                        <div class="return-item">
                            <div class="label">夏普比率</div>
                            <div class="value">${(strategy.sharpe_ratio || 0).toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="chart-${index}"></canvas>
                    </div>
                    <div class="stats">
                        <span>💰 持仓: ${holdings.length}只</span>
                        <span>📈 胜率: ${((strategy.win_rate || 0) > 1 ? (strategy.win_rate || 0) : (strategy.win_rate || 0) * 100).toFixed(0)}%</span>
                        <span>📉 回撤: ${((strategy.max_drawdown || 0) * 100).toFixed(1)}%</span>
                    </div>
                `;
                
                grid.appendChild(card);
                
                // 绘制迷你图表
                setTimeout(() => renderMiniChart(index, strategy.equity_curve || [], strategy.initial_capital), 50);
            });
        }
        
        function renderMiniChart(index, equityCurve, initialCapital) {
            const ctx = document.getElementById(`chart-${index}`);
            if (!ctx) return;
            
            if (charts[index]) {
                charts[index].destroy();
            }
            
            if (equityCurve.length < 2) {
                equityCurve = [initialCapital, initialCapital * 1.01];
            }
            
            const color = equityCurve[equityCurve.length - 1] >= equityCurve[0] ? '#22c55e' : '#ef4444';
            
            charts[index] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: equityCurve.map((_, i) => i),
                    datasets: [{
                        data: equityCurve,
                        borderColor: color,
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: color + '20',
                        tension: 0.4,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { display: false }
                    }
                }
            });
        }
        
        // 加载数据
        loadData();
    </script>
</body>
</html>
